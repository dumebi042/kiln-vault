[profile.default]
src = "src"
out = "out"
libs = ["lib"]
solc_version = "0.8.22"
optimizer = true
optimizer_runs = 200
remappings = [
    "@openzeppelin/contracts/=verified/lib/openzeppelin-contracts/contracts/",
    "@openzeppelin-upgradeable/=verified/lib/openzeppelin-contracts-upgradeable/contracts/",
    "@openzeppelin/access/=verified/lib/openzeppelin-contracts/contracts/access/",
    "@openzeppelin/interfaces/=verified/lib/openzeppelin-contracts/contracts/interfaces/",
    "@openzeppelin/proxy/=verified/lib/openzeppelin-contracts/contracts/proxy/",
    "@openzeppelin/token/=verified/lib/openzeppelin-contracts/contracts/token/",
    "@openzeppelin/utils/=verified/lib/openzeppelin-contracts/contracts/utils/"
]
fs_permissions = [
    { access = "read", path = "./broadcast" }
]
ffi = true

# See more config options https://github.com/foundry-rs/foundry/blob/master/crates/config/README.md#all-options
